<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>digi2 essentials — dokumentacja atrybutów dla Webflow</title>
<meta name="description" content="Dokumentacja biblioteki digi2 essentials: kreator konfiguracji, drzewka struktur Webflow i pełne katalogi atrybutów d2-*.">
<script>(function(){try{var t=localStorage.getItem('d2-docs-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#111111; --bg-2:#161616; --card:#1d1d1d; --card-2:#242424; --card-3:#2e2e2e;
  --border:#2b2b2b; --border-2:#3a3a3a;
  --text:#ffffff; --text-2:#b8b8b8; --text-3:#7d7d7d;
  --lime:#b9fd3b; --lime-dim:rgba(185,253,59,.14); --lime-border:rgba(185,253,59,.3); --on-lime:#151515;
  --chip-bg:#333333; --chip-attr:#b9fd3b; --chip-val:#e3e3e3;
  --input-bg:#1a1a1a; --hover:#1c1c1c;
  --note-bg:rgba(185,253,59,.06); --note-border:rgba(185,253,59,.22); --note-text:#cfe3a4;
  --warn-bg:rgba(255,159,67,.07); --warn-border:rgba(255,159,67,.3); --warn-text:#f3c896;
  --sq-bg:#ffffff; --sq-text:#111111;
  --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Hanken Grotesk',system-ui,sans-serif;
  --sidebar:280px; --r:6px;
}
[data-theme="light"]{
  --bg:#fafafa; --bg-2:#f4f4f4; --card:#ffffff; --card-2:#f3f3f3; --card-3:#e9e9e9;
  --border:#e4e4e4; --border-2:#d4d4d4;
  --text:#141414; --text-2:#4d4d4d; --text-3:#8a8a8a;
  --lime:#b9fd3b; --lime-dim:rgba(148,204,32,.12); --lime-border:rgba(120,170,20,.35); --on-lime:#151515;
  --chip-bg:#efefef; --chip-attr:#3f6212; --chip-val:#3d3d3d;
  --input-bg:#ffffff; --hover:#f0f0f0;
  --note-bg:#f5fbe3; --note-border:#dcedad; --note-text:#44520f;
  --warn-bg:#fff5ea; --warn-border:#f5d9b6; --warn-text:#7c4a12;
  --sq-bg:#141414; --sq-text:#ffffff;
}

html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;font-size:15.5px;-webkit-font-smoothing:antialiased}
a{color:var(--text);text-decoration:none}
code{font-family:var(--mono);font-size:.92em;background:var(--card-2);border:1px solid var(--border);padding:.5px 5px;border-radius:4px}
::selection{background:rgba(185,253,59,.28)}

/* ── kwadrat z numerem (styl kroków) ── */
.sq{display:inline-grid;place-items:center;width:26px;height:26px;background:var(--sq-bg);color:var(--sq-text);font:700 14px var(--sans);border-radius:4px;flex:none}

/* ───────────────── Sidebar ───────────────── */
.sidebar{position:fixed;inset:0 auto 0 0;width:var(--sidebar);background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:60}
.sb-logo{display:flex;align-items:center;gap:10px;padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.sb-logo .mark{width:30px;height:30px;border-radius:4px;background:var(--lime);display:grid;place-items:center;color:#151515;font-family:var(--mono);font-weight:600;font-size:13px;flex:none}
.sb-logo .tt b{font-size:15px;font-weight:600;letter-spacing:-.01em;display:block;line-height:1.2}
.sb-logo .tt span{font:500 10px var(--mono);color:var(--text-3);letter-spacing:.08em;text-transform:uppercase}
.theme-btn{margin-left:auto;width:30px;height:30px;border:1px solid var(--border-2);border-radius:4px;background:transparent;display:grid;place-items:center;cursor:pointer;color:var(--text-2)}
.theme-btn:hover{border-color:var(--text-3);color:var(--text)}
.theme-btn svg{width:14px;height:14px;stroke:currentColor}
.sb-search{padding:12px 14px;position:relative;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;padding:8px 30px 8px 32px;border:1px solid var(--border-2);border-radius:4px;font:500 13px var(--sans);background:var(--input-bg);color:var(--text);outline:none}
.sb-search input::placeholder{color:var(--text-3)}
.sb-search input:focus{border-color:var(--lime)}
.sb-search svg{position:absolute;left:25px;top:22px;width:14px;height:14px;stroke:var(--text-3)}
.sb-search kbd{position:absolute;right:24px;top:20px;font:600 10px var(--mono);color:var(--text-3);border:1px solid var(--border-2);border-radius:3px;padding:1px 5px}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0 20px}
.sb-cat{font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);padding:18px 18px 6px}
.sb-link{display:flex;align-items:center;gap:10px;padding:6.5px 18px;color:var(--text-2);font-size:13.5px;font-weight:500;border-left:2px solid transparent}
.sb-link:hover{background:var(--hover);color:var(--text);text-decoration:none}
.sb-link.active{color:var(--text);border-left-color:var(--lime);background:var(--hover);font-weight:600}
.sb-link .dot{width:7px;height:7px;border-radius:1.5px;flex:none;opacity:.9}
.sb-foot{padding:12px 18px;border-top:1px solid var(--border);font:500 11px var(--mono);color:var(--text-3)}
.sb-foot a{color:var(--text-2)}
.sb-foot a:hover{color:var(--lime);text-decoration:none}

/* search results */
.search-pop{position:absolute;top:52px;left:14px;right:14px;background:var(--card);border:1px solid var(--border-2);border-radius:var(--r);box-shadow:0 20px 50px rgba(0,0,0,.45);max-height:380px;overflow-y:auto;z-index:80;display:none}
.search-pop.open{display:block}
.search-pop .sp-item{display:block;padding:9px 13px;border-bottom:1px solid var(--border)}
.search-pop .sp-item:last-child{border-bottom:none}
.search-pop .sp-item:hover{background:var(--card-2);text-decoration:none}
.search-pop .sp-attr{font:600 12px var(--mono);color:var(--chip-attr)}
.search-pop .sp-mod{font-size:11px;color:var(--text-3);font-weight:600}
.search-pop .sp-desc{font-size:11.5px;color:var(--text-2);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-pop .sp-empty{padding:14px;font-size:12.5px;color:var(--text-3);text-align:center}

/* ───────────────── Layout ───────────────── */
.main{margin-left:var(--sidebar);min-height:100vh}
.content{max-width:920px;margin:0 auto;padding:40px 48px 120px}
.topbar{display:none}

/* ───────────────── Typografia ───────────────── */
.crumb{font:600 10.5px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.crumb .sep{color:var(--border-2)}
.crumb .here{color:var(--text-2)}
h1{font-size:42px;font-weight:600;letter-spacing:-.025em;line-height:1.08;max-width:720px}
.page-meta{display:flex;gap:14px;align-items:center;margin-top:16px;flex-wrap:wrap}
.flag-chip{display:inline-flex;align-items:center;font:600 12.5px var(--mono);color:var(--chip-attr);background:var(--chip-bg);border-radius:4px;padding:3px 9px}
.meta-txt{font:500 12px var(--mono);color:var(--text-3)}
.lead{font-size:17px;color:var(--text-2);max-width:680px;margin:18px 0 8px;line-height:1.65}
h2{font-size:22px;font-weight:600;letter-spacing:-.015em;margin:56px 0 8px;display:flex;align-items:center;gap:12px}
h2 .anchor{opacity:0;font-weight:500;font-size:15px;color:var(--text-3)}
h2:hover .anchor{opacity:1}
h3{font-size:15.5px;font-weight:600;margin:26px 0 6px}
.sec-desc{color:var(--text-2);font-size:14px;max-width:700px;margin-bottom:14px}
p.note{font-size:13.5px;color:var(--note-text);background:var(--note-bg);border:1px solid var(--note-border);border-radius:var(--r);padding:10px 14px;margin:12px 0}
p.note b{color:var(--text)}
p.note code{background:rgba(0,0,0,.2);border-color:transparent}
[data-theme="light"] p.note code{background:rgba(255,255,255,.6)}
.warn{font-size:13.5px;color:var(--warn-text);background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--r);padding:10px 14px;margin:12px 0}

/* przerywnik jak u finsweet */
.dash{display:flex;align-items:center;gap:16px;margin:44px 0;color:var(--text-2);font-size:14px}
.dash::before,.dash::after{content:'';flex:1;border-top:1px dashed var(--border-2)}
.dash .arr{color:var(--lime);font-size:16px}

/* ───────────────── Chipy atrybutów ───────────────── */
.chip{display:inline-flex;align-items:center;font:600 12px var(--mono);color:var(--chip-attr);background:var(--chip-bg);border-radius:4px;padding:3px 8px;cursor:pointer;white-space:normal;word-break:break-word;text-align:left;vertical-align:middle}
.chip .v{color:var(--chip-val);font-weight:400}
.chip:hover{outline:1px solid var(--lime-border)}
.chip.copied{color:var(--on-lime);background:var(--lime)}
.chip.copied .v{color:var(--on-lime)}

.tag-req{display:inline-block;font:700 9.5px var(--mono);letter-spacing:.08em;text-transform:uppercase;background:var(--sq-bg);color:var(--sq-text);border-radius:3px;padding:2px 6px}
.tag-set{display:inline-block;font:600 9.5px var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);border:1px solid var(--border-2);border-radius:3px;padding:1.5px 6px}

/* ───────────────── Bloki kodu ───────────────── */
.code{background:#1a1a1a;border:1px solid #2b2b2b;border-left:3px solid var(--lime);border-radius:var(--r);margin:14px 0;overflow:hidden}
.code-head{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid #2b2b2b}
.code-head .lang{font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:#7d7d7d}
.copy-btn{display:inline-flex;align-items:center;gap:6px;font:600 11.5px var(--sans);color:#151515;background:var(--lime);border:none;border-radius:4px;padding:5px 11px;cursor:pointer}
.copy-btn:hover{filter:brightness(1.06)}
.copy-btn.copied{background:#e6ffa9}
.code pre{padding:14px 16px;overflow-x:auto;font:400 12.5px/1.7 var(--mono);color:#e6e6e6}
.code pre .c{color:#6d6d6d}
.code pre .s{color:#d9d9d9}
.code pre .d2{color:#b9fd3b}
.code pre .tg{color:#9a9a9a}
.code pre .k{color:#bdbdbd}

/* ───────────────── Drzewko Webflow (zawsze ciemne) ───────────────── */
.wf{background:#191919;border:1px solid #2b2b2b;border-radius:var(--r);margin:14px 0;overflow:hidden}
.wf-head{display:flex;align-items:center;gap:8px;padding:8px 13px;border-bottom:1px solid #2b2b2b}
.wf-head .dots{display:flex;gap:5px}
.wf-head .dots i{width:8px;height:8px;border-radius:50%;background:#333}
.wf-head .t{font:600 11px var(--sans);color:#8d8d8d;letter-spacing:.03em}
.wf-head .hint{margin-left:auto;font:500 10.5px var(--sans);color:#5f5f5f}
.wf-body{padding:8px 10px 12px;overflow-x:auto}
.wf-node{flex:1;min-width:0}
.wf-line{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:4px;min-height:28px;flex-wrap:wrap}
.wf-line:hover{background:#212121}
.wf-caret{width:10px;flex:none;color:#565656;font-size:9px;line-height:1}
.wf-ico{width:15px;height:15px;flex:none;display:grid;place-items:center}
.wf-ico svg{width:14px;height:14px;stroke:#8f8f8f}
.wf-label{font:500 12.5px var(--sans);color:#d9d9d9;white-space:nowrap}
.wf-label b{color:#fff;font-weight:600}
.wf-note{font:400 11px var(--sans);color:#6a6a6a;font-style:italic;white-space:nowrap}
.wf-pills{display:inline-flex;gap:5px;flex-wrap:wrap;margin-left:2px}
.wf-pill{display:inline-flex;align-items:center;font:600 10.5px var(--mono);color:#b9fd3b;background:#333;border-radius:4px;padding:2px 7px;cursor:pointer;white-space:nowrap}
.wf-pill .v{color:#e3e3e3;font-weight:400}
.wf-pill:hover{outline:1px solid rgba(185,253,59,.35)}
.wf-pill.copied{background:#b9fd3b;color:#151515}
.wf-pill.copied .v{color:#151515}
.wf-kids{margin-left:11px;padding-left:12px;border-left:1px solid #2e2e2e}

/* ───────────────── Kreator ───────────────── */
.kreator{border:1px solid var(--border-2);background:var(--card);border-radius:var(--r);margin:16px 0;overflow:hidden}
.kr-head{display:flex;align-items:baseline;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border)}
.kr-head .kicker{font:600 10px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--chip-attr)}
.kr-head b{font-size:15px;font-weight:600}
.kr-head span.sub{font-size:12px;color:var(--text-3)}
.kr-grid{display:grid;grid-template-columns:300px 1fr}
.kr-form{padding:18px 20px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:13px;background:var(--bg-2)}
.kr-out{padding:18px 20px;min-width:0}
.kr-field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.kr-field .hint{font-size:11px;color:var(--text-3);margin-top:3px;line-height:1.45}
.kr-field input[type=text],.kr-field input[type=number],.kr-field input[type=datetime-local],.kr-field select{width:100%;padding:7.5px 10px;border:1px solid var(--border-2);border-radius:4px;font:500 13px var(--sans);color:var(--text);background:var(--input-bg);outline:none;color-scheme:dark}
[data-theme="light"] .kr-field input,[data-theme="light"] .kr-field select{color-scheme:light}
.kr-field input:focus,.kr-field select:focus{border-color:var(--lime)}
.kr-check{display:flex;align-items:center;gap:8px;cursor:pointer}
.kr-check input{width:15px;height:15px;accent-color:var(--lime);cursor:pointer}
.kr-check span{font-size:13px;font-weight:600;color:var(--text-2)}
.kr-sub{margin-left:23px;display:flex;flex-direction:column;gap:9px;padding-top:8px;border-left:1px solid var(--border-2);padding-left:12px}
.kr-out-label{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600;color:var(--text);margin:18px 0 6px}
.kr-out-label:first-child{margin-top:0}
.kr-out-label .sq{width:24px;height:24px;font-size:13px}
.kr-out .wf,.kr-out .code{margin:6px 0 12px}
.kr-steps{list-style:none;display:flex;flex-direction:column;gap:8px;margin:6px 0 12px}
.kr-steps li{display:flex;gap:10px;align-items:flex-start;background:var(--card-2);border:1px solid var(--border);border-radius:4px;padding:9px 12px;font-size:13px;color:var(--text-2)}
.kr-steps .n{flex:none;width:20px;height:20px;border-radius:3px;background:var(--sq-bg);color:var(--sq-text);font:700 11px var(--sans);display:grid;place-items:center;margin-top:1px}
.kr-steps b{color:var(--text)}
details.kr-details{margin:4px 0 10px}
details.kr-details summary{cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text-2)}
details.kr-details summary:hover{color:var(--lime)}

/* ───────────────── Tabela atrybutów ───────────────── */
.attr-tools{display:flex;align-items:center;gap:10px;margin:12px 0 8px}
.attr-tools input{flex:1;max-width:320px;padding:7px 12px;border:1px solid var(--border-2);border-radius:4px;font:500 13px var(--sans);outline:none;background:var(--input-bg);color:var(--text)}
.attr-tools input:focus{border-color:var(--lime)}
.attr-tools .cnt{font:500 11.5px var(--mono);color:var(--text-3)}
.attr-table{width:100%;border:1px solid var(--border);border-radius:var(--r);background:var(--card);overflow:hidden}
.attr-row{display:grid;grid-template-columns:minmax(210px,1.15fr) minmax(140px,.75fr) 1.6fr;gap:14px;padding:11px 16px;border-bottom:1px solid var(--border);align-items:start}
.attr-row>div{min-width:0}
.attr-row:last-child{border-bottom:none}
.attr-row.head{background:var(--bg-2);font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);padding:8px 16px}
.attr-row.flash{animation:flash 1.6s ease-out}
@keyframes flash{0%{background:var(--lime-dim)}100%{background:transparent}}
.attr-row .col-a{display:flex;flex-direction:column;gap:5px;align-items:flex-start}
.attr-row .el{font-size:12.5px;font-weight:600;color:var(--text-2)}
.attr-row .d{font-size:13px;color:var(--text-2)}
.attr-row .d .n{display:block;font-size:11.5px;color:var(--text-3);margin-top:2px}

/* ───────────────── Zakładki struktur ───────────────── */
.struct-tabs{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 2px}
.struct-tab{font:600 12.5px var(--sans);color:var(--text-2);background:var(--card);border:1px solid var(--border-2);border-radius:4px;padding:6px 13px;cursor:pointer}
.struct-tab:hover{color:var(--text);border-color:var(--text-3)}
.struct-tab.active{background:var(--sq-bg);border-color:var(--sq-bg);color:var(--sq-text)}
.struct-pane{display:none}
.struct-pane.active{display:block}
.struct-pane .pane-desc{font-size:13px;color:var(--text-2);margin:10px 0 2px}

/* ───────────────── TOC ───────────────── */
.toc{position:fixed;top:44px;right:24px;width:190px;display:none}
.toc .t{font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.toc a{display:block;font-size:12.5px;color:var(--text-2);padding:3.5px 0 3.5px 12px;border-left:1px solid var(--border-2)}
.toc a:hover{color:var(--lime);text-decoration:none;border-color:var(--lime)}
@media(min-width:1480px){.toc{display:block}}

/* ───────────────── Strona startowa ───────────────── */
.hero{padding:8px 0 0}
.hero h1{font-size:52px;max-width:760px}
.hero .lead{font-size:18px;max-width:660px}
.builder{border:1px solid var(--border-2);border-radius:var(--r);background:var(--card);margin:18px 0;overflow:hidden}
.builder-head{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}
.builder-head b{font-size:14.5px;font-weight:600}
.builder-head span{font-size:12px;color:var(--text-3)}
.builder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:8px;padding:16px 20px}
.mod-check{display:flex;align-items:center;gap:8px;border:1px solid var(--border-2);border-radius:4px;padding:8px 10px;cursor:pointer;background:var(--bg-2)}
.mod-check:hover{border-color:var(--text-3)}
.mod-check.on{border-color:var(--lime-border);background:var(--lime-dim)}
.mod-check input{accent-color:var(--lime)}
.mod-check .nm{font-size:12.5px;font-weight:600}
.mod-check .fl{font:500 9.5px var(--mono);color:var(--text-3);margin-left:auto}
.builder .gtm-row{padding:0 20px 14px;display:none;align-items:center;gap:10px}
.builder .gtm-row.show{display:flex}
.builder .gtm-row label{font-size:12.5px;font-weight:600}
.builder .gtm-row input{padding:7px 11px;border:1px solid var(--border-2);border-radius:4px;font:500 13px var(--mono);width:220px;outline:none;background:var(--input-bg);color:var(--text)}
.builder .gtm-row input:focus{border-color:var(--lime)}
.builder .out{padding:0 20px 18px}
.steps{display:flex;flex-direction:column;gap:0;margin:18px 0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.step{display:flex;gap:14px;align-items:flex-start;background:var(--card);padding:18px 20px;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step h3{margin:0 0 4px;font-size:15px}
.step p{font-size:13.5px;color:var(--text-2)}

/* lista modułów — wiersze jak na home finsweet */
.modlist{border-top:1px solid var(--border);margin-top:8px}
.modcat{font:600 10.5px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);padding:26px 0 10px}
.modrow{display:grid;grid-template-columns:minmax(200px,1fr) 1.4fr auto;gap:20px;align-items:center;padding:16px 12px;border-bottom:1px solid var(--border);border-radius:4px}
.modrow:hover{background:var(--hover);text-decoration:none}
.modrow .nm{display:flex;align-items:center;gap:12px;font-size:21px;font-weight:600;letter-spacing:-.015em;color:var(--text)}
.modrow .dot{width:10px;height:10px;border-radius:2px;flex:none}
.modrow .ds{font-size:13px;color:var(--text-2)}
.modrow .ds .fl{display:block;font:500 10.5px var(--mono);color:var(--text-3);margin-top:3px}
.modrow .arr{color:var(--text-3);font-size:18px;transition:.12s}
.modrow:hover .arr{color:var(--lime);transform:translateX(3px)}

.example-block{margin:16px 0}

/* ───────────────── Responsive ───────────────── */
@media(max-width:1120px){.kr-grid{grid-template-columns:1fr}.kr-form{border-right:none;border-bottom:1px solid var(--border)}}
@media(max-width:980px){
  .sidebar{transform:translateX(-100%);transition:.22s}
  .sidebar.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.5)}
  .main{margin-left:0}
  .topbar{display:flex;position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;align-items:center;gap:12px}
  .topbar .burger{width:36px;height:36px;border:1px solid var(--border-2);border-radius:4px;background:transparent;display:grid;place-items:center;cursor:pointer}
  .topbar .burger svg{stroke:var(--text)}
  .topbar b{font-size:14px}
  .content{padding:26px 20px 100px}
  h1{font-size:30px}
  .hero h1{font-size:32px}
  .attr-row{grid-template-columns:1fr;gap:6px}
  .attr-row.head{display:none}
  .modrow{grid-template-columns:1fr auto;gap:10px}
  .modrow .ds{display:none}
}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:55;display:none}
.overlay.show{display:block}
